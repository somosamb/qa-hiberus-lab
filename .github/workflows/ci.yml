# ---------------------------------------------------------------------------
# .github/workflows/ci.yml
#
# GitHub Actions CI/CD pipeline for qa-hiberus-lab.
#
# WHAT IS THIS?
# GitHub Actions is a CI/CD platform built into GitHub. This file defines
# a "workflow" — a set of automated steps that run in the cloud whenever
# a specific event occurs (e.g. a push or pull request to main).
#
# WHY CI/CD FOR QA?
# Running tests automatically on every code change means:
#   - Regressions are caught immediately, not at the end of a sprint
#   - Every team member can see test results without running locally
#   - The pipeline acts as a quality gate before merging code
#
# PHASE 3 of the learning plan.
# ---------------------------------------------------------------------------

name: QA Test Suite

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    # ubuntu-latest is the standard choice for Python/Selenium projects.
    runs-on: ubuntu-latest

    steps:

      # Step 1: Check out the repository code onto the runner machine.
      # Without this step, the runner has no access to our files.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Install the specified Python version on the runner.
      # We pin to 3.12 for stability — compatible with all our dependencies.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Step 3: Install Chromium and its dependencies.
      # GitHub's ubuntu-latest runner does not ship with a browser binary.
      # chromium-browser provides the binary that Selenium will drive.
      - name: Install Chromium
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y chromium-browser

      # Step 4: Install all Python packages listed in requirements.txt.
      # --no-cache-dir avoids stale cached packages on the runner.
      - name: Install Python dependencies
        run: pip install --no-cache-dir -r requirements.txt

      # Step 5: Run the test suite.
      # Headless mode is handled inside conftest.py via Chrome options.
      # --html writes the report to reports/report.html.
      # --self-contained-html bundles CSS/JS into the single HTML file.
      # -v enables verbose output so each test name is shown in the log.
      - name: Run pytest
        run: |
          mkdir -p reports
          pytest tests/test_login.py -v --html=reports/report.html --self-contained-html

      # Step 6: Upload the HTML report as a downloadable artifact.
      # After the pipeline runs, the report is available in the
      # GitHub Actions UI under "Artifacts" for 30 days.
      - name: Upload test report
        # always() ensures the report is uploaded even if tests fail —
        # we still want to see which tests failed and why.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: reports/report.html
