# ---------------------------------------------------------------------------
# pytest.ini
#
# Central configuration file for pytest.
# Options defined here apply to every `pytest` invocation automatically,
# without needing to type them on the command line each time.
#
# BEST PRACTICES APPLIED:
#   - testpaths: tells pytest where to look for tests — avoids scanning the
#     entire project and accidentally picking up non-test files
#   - addopts: default CLI flags applied on every run
#   - markers: declare custom markers here to avoid PytestUnknownMarkWarning
# ---------------------------------------------------------------------------

[pytest]

# ---------------------------------------------------------------------------
# testpaths
#
# Directories pytest will search for test files (test_*.py / *_test.py).
# Restricting to `tests/` keeps collection fast and predictable.
# ---------------------------------------------------------------------------
testpaths = tests

# ---------------------------------------------------------------------------
# addopts — default options added to every pytest run
#
# -v                      verbose: show each test name and PASSED/FAILED
# --tb=short              short traceback format — enough detail without noise
# --html=reports/report.html    always generate an HTML report
# --self-contained-html   embed CSS/JS in the HTML so it opens without a server
# ---------------------------------------------------------------------------
addopts =
    -v
    --tb=short
    --html=reports/report.html
    --self-contained-html

# ---------------------------------------------------------------------------
# markers
#
# Custom markers used in the test suite.
# Declaring them here prevents pytest from raising warnings when it sees them.
# ---------------------------------------------------------------------------
markers =
    smoke: fast, critical-path tests that verify the system is up
    regression: full regression suite covering all functional areas
    api: tests that call external REST APIs directly
